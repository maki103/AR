<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- スマホ必須 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>MindAR Image Tracking</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- 画面レイアウト対策 -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: assets/targets2.mind"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <!-- アセット -->
  <a-assets>
    <img id="card"
      src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png">

    <a-asset-item id="avatarModel"
      src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/softmind/scene.gltf">
    </a-asset-item>
  </a-assets>

  <!-- カメラ -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- ターゲット -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 画像 -->
    <a-plane src="#card" height="0.552" width="1"></a-plane>

    <!-- 3Dモデル -->
    <a-gltf-model
      src="#avatarModel"
      position="0 0 0.1"
      scale="0.02 0.02 0.02"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    </a-gltf-model>

  </a-entity>

</a-scene>

</body>
</html>
